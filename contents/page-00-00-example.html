<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prnst-cms | example</title>
    
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/global.css">
</head>
<body class="antialiased">

    <div id="navbar-placeholder"></div>

    <main class="view-container">
        <div class="grid-two-one">
            
            <div class="left-col">
                <section class="view-card">
                    <h1 class="view-title">example content</h1>
                    <hr class="title-sep">

                    <nav class="breadcrumb">
                        <div class="crumb-line">
                            &gt; <a href="/index.html">home</a> &gt; 
                            <a href="/contents/index.html">contents</a> &gt; 
                            <span class="current">example</span>
                        </div>
                        
                        <div class="crumb-line external-link">
                            &gt; <a href="https://github.com/">exmp</a> &gt; 
                            <a href="https://github.com">about</a>
                        </div>
                    </nav>

                    <div class="view-content">
                        <p>
                            lorem ipsum dolor sit amet, consectetur adipiscing elit. sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.
                        </p>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <div id="sidebar-placeholder"></div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        async function loadComponent(id, file) {
            const element = document.getElementById(id);
            if (!element) return;
            
            try {
                // Using root-relative pathing for consistent loading
                const response = await fetch(`/${file}`);
                if (response.ok) {
                    const data = await response.text();
                    element.innerHTML = data;
                }
            } catch (error) {
                console.error("error loading component:", file, error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadComponent('navbar-placeholder', 'navbar.html');
            loadComponent('footer-placeholder', 'footer.html');
            loadComponent('sidebar-placeholder', 'rght-clmn.html');
        });
    </script>
</body>
</html>
