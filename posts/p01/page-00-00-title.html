    <div id="footer-placeholder"></div>

    <script>
        function updateTimestamp() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const element = document.getElementById('current-timestamp');
            if (element) {
                element.innerText = now.toLocaleDateString('en-US', options).toLowerCase();
            }
        }
        updateTimestamp();

        async function loadComponent(id, file, isGlobal = false) {
            const element = document.getElementById(id);
            if (!element) return;
            try {
                const path = isGlobal ? `/${file}` : file;
                const response = await fetch(path);
                if (response.ok) {
                    element.innerHTML = await response.text();
                }
            } catch (error) { console.error("Component load failed:", file, error); }
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Global site layout
            loadComponent('navbar-placeholder', 'navbar.html', true);
            loadComponent('footer-placeholder', 'footer.html', true);
            
            // Folder-specific components
            loadComponent('sidebar-placeholder-tp', 'rght-clmn-b-tp.html');
            loadComponent('sidebar-placeholder-bt', 'rght-clmn-b-bt.html');
        });
    </script>
</body>
