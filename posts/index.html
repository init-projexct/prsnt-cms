<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prsnt-cms | directory</title>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../global.css">
</head>
<body class="antialiased">

    <div id="navbar-placeholder"></div>

    <main class="view-container">
        <div class="grid-two-one">
            
            <div class="left-col">
                <section class="view-card">
                    <h1 class="view-title">directory index</h1>
                    <hr class="title-sep">

                    <nav class="breadcrumb">
                        <div class="crumb-line">
                            &gt; <a href="/index.html">home</a> &gt; 
                            <span class="current">posts</span>
                        </div>
                    </nav>

                    <div class="view-content">
                        <p>automated list of all pages in this directory:</p>
                        
                        <ul id="file-list" class="list-flush" style="line-height: 2;">
                            <li>loading structure from github...</li>
                        </ul>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <div id="sidebar-placeholder"></div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // COMPONENT LOADER
        async function loadComponent(id, file) {
            const element = document.getElementById(id);
            if (!element) return;
            try {
                // Using root path for components
                const response = await fetch(`/${file}`);
                if (response.ok) {
                    const data = await response.text();
                    element.innerHTML = data;
                }
            } catch (error) { console.error("component error:", file, error); }
        }

        // GITHUB API SCANNER (Targeting prsnt-cms)
        async function loadFiles() {
            // Updated to your new account and repo name
            const owner = "prsnt-cms"; 
            const repo = "prsnt-cms"; 
            const path = "prsnt-cms"; 
            const listElement = document.getElementById('file-list');

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
                
                if (response.status === 404 || response.status === 401) {
                    listElement.innerHTML = "<li><em>note: directory index hidden (repository is private)</em></li>";
                    return;
                }

                const files = await response.json();
                listElement.innerHTML = ''; 

                files.forEach(file => {
                    // Filter: show .html files, ignore index and template files
                    if (file.name.endsWith('.html') && file.name !== "index.html") {
                        const li = document.createElement('li');
                        
                        // formatting: remove dashes and extension
                        const displayName = file.name.replace(/-/g, ' ').replace('.html', '');
                        
                        li.innerHTML = `<strong>&gt;</strong> <a href="${file.name}">${displayName}</a>`;
                        listElement.appendChild(li);
                    }
                });

                if (listElement.children.length === 0) {
                    listElement.innerHTML = "<li>no pages found in this directory.</li>";
                }
            } catch (e) {
                listElement.innerText = "error fetching repository structure.";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Load skeleton parts
            loadComponent('navbar-placeholder', 'navbar.html');
            loadComponent('footer-placeholder', 'footer.html');
            loadComponent('sidebar-placeholder', 'rght-clmn.html');
            
            // Execute the scan
            loadFiles();
        });
    </script>
</body>
</html>
