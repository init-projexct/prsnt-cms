<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frameworks | prsnt-cms</title>
    
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/code/element.css">
    
    <link rel="stylesheet" href="./cntntc.css">
    
    <script src="./frworks.js"></script>
</head>
<body class="antialiased">

    <div id="navbar-placeholder"></div>

    <main class="view-container">
        <div class="grid-two-one">
            <div class="left-col">
                <section class="view-card">
                    <h1 class="view-title" id="view-title-text">loading...</h1>
                    <div class="view-content">
                        <div class="frameworks-nav-bar">
                            <button onclick="window.Frmwrk.prev()" class="nav-arrow-btn" aria-label="Previous">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                            </button>
                            <button onclick="window.Frmwrk.next()" class="nav-arrow-btn" aria-label="Next">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                        </div>
                        <div id="sbcnt-content-area" class="sbcnt-content-area"></div>
                    </div>
                </section>
            </div>

            <div class="right-col">
                <div class="right-col-links-style">
                    <h2 class="fright-col-link-h2">index</h2>
                    <div id="link-button-container" class="link-button-container"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        /**
         * COMPONENT LOADER
         * Using absolute paths for shared components ensures they 
         * load correctly from any subfolder depth.
         */
        async function loadStaticComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Status: ${response.status}`);
                const data = await response.text();
                document.getElementById(id).innerHTML = data;
            } catch (e) { 
                console.error(`Component Error (${id}):`, e); 
            }
        }

        function bootstrap() {
            // Absolute paths to your root components
            loadStaticComponent('navbar-placeholder', '/navbar.html');
            loadStaticComponent('footer-placeholder', '/footer.html');

            const interval = setInterval(() => {
                if (window.Frmwrk) {
                    clearInterval(interval);
                    window.Frmwrk.init();
                }
            }, 50);
            setTimeout(() => clearInterval(interval), 3000);
        }

        if (document.readyState === 'complete') {
            bootstrap();
        } else {
            window.addEventListener('load', bootstrap);
        }
    </script>
</body>
</html>
